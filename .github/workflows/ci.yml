name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.13

      - name: Install locked dependencies
        run: uv sync --all-extras --dev --frozen

      - name: Lint (ruff)
        run: uv run ruff check app/ config/

      - name: Run backend tests with coverage
        run: |
          uv run pytest tests/ \
            --cov=app --cov-report=term --cov-report=xml --cov-fail-under=60

      - name: Backend import smoke test
        run: |
          uv run python -c "import app.api.server; import app.engine.live_order_pipeline; print('imports OK')"

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install locked dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: frontend
        run: pnpm typecheck

      - name: Test (Vitest)
        working-directory: frontend
        run: pnpm test:run

      - name: Build
        working-directory: frontend
        run: pnpm build
