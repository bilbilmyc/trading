<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 540" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">
  <style>
    .box { fill: #1A2440; stroke: #2A365C; stroke-width: 1.5; }
    .box-accent { fill: #0E2230; stroke: #38BDF8; stroke-width: 2; }
    .box-warn { fill: #2A1F0E; stroke: #FBBF24; stroke-width: 1.5; }
    .text { fill: #F1F5F9; }
    .text-dim { fill: #7B86A3; font-size: 11px; }
    .text-warn { fill: #FBBF24; }
    .arrow { stroke: #38BDF8; stroke-width: 1.5; fill: none; marker-end: url(#arr); }
    .arrow-dim { stroke: #4F5874; stroke-width: 1; fill: none; marker-end: url(#arrd); }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38BDF8"/>
    </marker>
    <marker id="arrd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4F5874"/>
    </marker>
  </defs>

  <text x="20" y="28" class="text" font-size="18" font-weight="600">LLM D→B→A 三层架构</text>
  <text x="20" y="48" class="text-dim">信号层 · 决策层 · 执行层，LLM 决策经过 5 重风控闸门</text>

  <!-- Layer D: Signal -->
  <rect x="40"  y="80"  class="box-accent" width="180" height="100" rx="10"/>
  <text x="130" y="105" class="text" text-anchor="middle" font-weight="600">D · Signal 信号层</text>
  <text x="130" y="130" class="text-dim" text-anchor="middle">/api/v1/ai/analyze</text>
  <text x="130" y="150" class="text-dim" text-anchor="middle">一次性 AI 市场分析</text>
  <text x="130" y="168" class="text-dim" text-anchor="middle">不自动下单</text>

  <!-- Layer B: Filter -->
  <rect x="270" y="80"  class="box-accent" width="180" height="100" rx="10"/>
  <text x="360" y="105" class="text" text-anchor="middle" font-weight="600">B · Filter 决策层</text>
  <text x="360" y="130" class="text-dim" text-anchor="middle">/api/v1/strategies/llm-filter</text>
  <text x="360" y="150" class="text-dim" text-anchor="middle">LLM 二次确认</text>
  <text x="360" y="168" class="text-dim" text-anchor="middle">/llm-filter/rejected 可看拒绝流</text>

  <!-- Layer A: Auto -->
  <rect x="500" y="80"  class="box-accent" width="180" height="100" rx="10"/>
  <text x="500" y="105" class="text" text-anchor="middle" font-weight="600" fill="#38BDF8">A · Auto 执行层</text>
  <text x="500" y="130" class="text-dim" text-anchor="middle">/api/v1/strategies/llm</text>
  <text x="500" y="150" class="text-dim" text-anchor="middle">mode: live / paper / signal</text>
  <text x="500" y="168" class="text-dim" text-anchor="middle">受 enable_live_trading 约束</text>

  <!-- Prompt context blocks (incoming data) -->
  <text x="20" y="220" class="text" font-weight="600">→ Prompt 上下文（每次调用重新拉取）</text>

  <rect x="20"  y="240" class="box" width="155" height="60" rx="8"/>
  <text x="97"  y="262" class="text" text-anchor="middle" font-weight="600">基本信息</text>
  <text x="97"  y="280" class="text-dim" text-anchor="middle">ticker + K 线</text>
  <text x="97"  y="294" class="text-dim" text-anchor="middle">symbol + interval</text>

  <rect x="195" y="240" class="box" width="155" height="60" rx="8"/>
  <text x="272" y="262" class="text" text-anchor="middle" font-weight="600">持仓</text>
  <text x="272" y="280" class="text-dim" text-anchor="middle">side / qty / avg</text>
  <text x="272" y="294" class="text-dim" text-anchor="middle">未实现 PnL</text>

  <rect x="370" y="240" class="box-warn" width="155" height="60" rx="8"/>
  <text x="447" y="262" class="text-warn" text-anchor="middle" font-weight="600">⚠ 风险状态</text>
  <text x="447" y="280" class="text-dim" text-anchor="middle">Kill Switch · 日亏</text>
  <text x="447" y="294" class="text-dim" text-anchor="middle">当前回撤 · 限速</text>

  <rect x="545" y="240" class="box" width="155" height="60" rx="8"/>
  <text x="622" y="262" class="text" text-anchor="middle" font-weight="600">近期表现</text>
  <text x="622" y="280" class="text-dim" text-anchor="middle">胜率 · 连盈连亏</text>
  <text x="622" y="294" class="text-dim" text-anchor="middle">平均盈亏</text>

  <!-- Provider -->
  <rect x="20"  y="340" class="box" width="320" height="70" rx="10"/>
  <text x="180" y="365" class="text" text-anchor="middle" font-weight="600">LLM Provider 抽象（URL 前缀自动路由）</text>
  <text x="60" y="385" class="text-dim" text-anchor="middle">OpenAI · Anthropic Claude</text>
  <text x="180" y="385" class="text-dim" text-anchor="middle">DeepSeek · MiniMax</text>
  <text x="280" y="385" class="text-dim" text-anchor="middle">Ollama (local)</text>
  <text x="180" y="403" class="text-dim" text-anchor="middle">fingerprint 缓存 30s · 三态错误 · 重试</text>

  <!-- Six-port pipeline (下游) -->
  <rect x="380" y="340" class="box" width="320" height="70" rx="10"/>
  <text x="540" y="365" class="text" text-anchor="middle" font-weight="600">6 端口 LiveOrderPipeline</text>
  <text x="540" y="385" class="text-dim" text-anchor="middle">Guard · Filters · Risk · Exchange</text>
  <text x="540" y="403" class="text-dim" text-anchor="middle">Tracker · Recorder · Observer</text>

  <!-- Arrows -->
  <line x1="130" y1="180" x2="130" y2="240" class="arrow-dim"/>
  <line x1="360" y1="180" x2="360" y2="240" class="arrow-dim"/>
  <line x1="590" y1="180" x2="590" y2="240" class="arrow-dim"/>
  <line x1="180" y1="300" x2="180" y2="340" class="arrow-dim"/>
  <line x1="350" y1="300" x2="350" y2="340" class="arrow-dim"/>
  <line x1="530" y1="300" x2="530" y2="340" class="arrow-dim"/>
  <line x1="180" y1="410" x2="380" y2="375" class="arrow"/>
  <line x1="540" y1="410" x2="700" y2="375" class="arrow-dim"/>

  <rect x="540" y="450" class="box" width="160" height="60" rx="8"/>
  <text x="620" y="472" class="text" text-anchor="middle" font-weight="600">SQLite (审计)</text>
  <text x="620" y="490" class="text-dim" text-anchor="middle">events · signals · orders</text>
  <text x="620" y="503" class="text-dim" text-anchor="middle">实时查询 + 回放</text>

  <text x="20" y="465" class="text-dim">system message 含 5 条硬约束 + 1 个 few-shot ·</text>
  <text x="20" y="480" class="text-dim">symbol 白名单（.env 配置）+ risk/trade 自动注入</text>
</svg>
