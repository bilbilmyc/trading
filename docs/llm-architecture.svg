<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#22c55e"/>
    </marker>
  </defs>

  <rect width="800" height="520" fill="url(#bg)" rx="8"/>

  <text x="400" y="32" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold" letter-spacing="1">LLM 策略：D → B → A 三层架构</text>
  <line x1="120" y1="44" x2="680" y2="44" stroke="#334155" stroke-width="1"/>

  <!-- Layer background -->
  <rect x="30" y="56" width="740" height="140" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="30" y="212" width="740" height="140" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="30" y="368" width="740" height="140" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <!-- ════════════════ D 方案 ════════════════ -->
  <rect x="46" y="68" width="100" height="28" rx="6" fill="#3b82f6"/>
  <text x="96" y="87" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">D</text>
  <text x="120" y="87" fill="#94a3b8" font-size="14" font-weight="600">信号顾问</text>
  <text x="680" y="87" fill="#64748b" font-size="11">mode=signal</text>

  <rect x="46" y="108" width="240" height="72" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="166" y="132" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="bold">行情数据 → LLMAnalyzer</text>
  <text x="166" y="152" text-anchor="middle" fill="#94a3b8" font-size="10">K 线 · 盘口 · 持仓上下文</text>
  <text x="166" y="170" text-anchor="middle" fill="#64748b" font-size="9">→ 构建 Prompt → 调用 LLM → 解析 JSON</text>

  <!-- Arrow -->
  <line x1="286" y1="144" x2="316" y2="144" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="316" y="108" width="200" height="72" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="416" y="132" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">LLMStrategy</text>
  <text x="416" y="152" text-anchor="middle" fill="#94a3b8" font-size="10">generate_signals()</text>
  <text x="416" y="170" text-anchor="middle" fill="#64748b" font-size="9">→ Signal(action, quantity, reason)</text>

  <!-- Arrow -->
  <line x1="516" y1="144" x2="546" y2="144" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="546" y="108" width="200" height="72" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="646" y="132" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold">引擎不执行</text>
  <text x="646" y="152" text-anchor="middle" fill="#94a3b8" font-size="10">信号进入面板展示</text>
  <text x="646" y="170" text-anchor="middle" fill="#64748b" font-size="9">用户自行决定是否开单</text>

  <!-- ════════════════ B 方案 ════════════════ -->
  <rect x="46" y="224" width="100" height="28" rx="6" fill="#f59e0b"/>
  <text x="96" y="243" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">B</text>
  <text x="120" y="243" fill="#94a3b8" font-size="14" font-weight="600">混合过滤</text>
  <text x="680" y="243" fill="#64748b" font-size="11">SMA + LLM 二次确认</text>

  <!-- SMA -->
  <rect x="46" y="264" width="140" height="72" rx="8" fill="#0f2937" stroke="#06b6d4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="116" y="290" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="bold">SMAStrategy</text>
  <text x="116" y="310" text-anchor="middle" fill="#94a3b8" font-size="10">双均线交叉</text>
  <text x="116" y="326" text-anchor="middle" fill="#64748b" font-size="9">Signal(buy/sell)</text>

  <!-- Arrow -->
  <line x1="186" y1="300" x2="216" y2="300" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LLM Filter -->
  <rect x="216" y="264" width="240" height="72" rx="8" fill="#1a0f33" stroke="#a855f7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="336" y="288" text-anchor="middle" fill="#c084fc" font-size="12" font-weight="bold">LLMSignalFilter</text>
  <text x="336" y="308" text-anchor="middle" fill="#94a3b8" font-size="10">LLM 分析当前市场</text>
  <text x="336" y="326" text-anchor="middle" fill="#64748b" font-size="9">方向一致？→ 放行 / 拒绝</text>

  <!-- Fork: accept / reject -->
  <line x1="456" y1="300" x2="520" y2="280" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="490" y="272" fill="#4ade80" font-size="10">放行</text>

  <line x1="456" y1="300" x2="520" y2="320" stroke="#f43f5e" stroke-width="1.5"/>
  <text x="490" y="338" fill="#fb7185" font-size="10">拒绝</text>

  <!-- Executed -->
  <rect x="520" y="256" width="150" height="44" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
  <text x="595" y="278" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold">引擎执行</text>
  <text x="595" y="294" text-anchor="middle" fill="#94a3b8" font-size="9">风控 → 下单 → 同步</text>

  <!-- Rejected log -->
  <rect x="520" y="308" width="220" height="32" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="630" y="330" text-anchor="middle" fill="#64748b" font-size="10">GET /api/v1/strategies/llm-filter/rejected</text>

  <!-- ════════════════ A 方案 ════════════════ -->
  <rect x="46" y="380" width="100" height="28" rx="6" fill="#22c55e"/>
  <text x="96" y="399" text-anchor="middle" fill="#052e16" font-size="13" font-weight="bold">A</text>
  <text x="120" y="399" fill="#94a3b8" font-size="14" font-weight="600">全自动执行</text>
  <text x="680" y="399" fill="#64748b" font-size="11">mode=live</text>

  <rect x="46" y="420" width="240" height="72" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="166" y="444" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="bold">行情数据 → LLMAnalyzer</text>
  <text x="166" y="464" text-anchor="middle" fill="#94a3b8" font-size="10">K 线 · 盘口 · 持仓上下文</text>
  <text x="166" y="482" text-anchor="middle" fill="#64748b" font-size="9">→ Prompt → LLM → JSON</text>

  <line x1="286" y1="456" x2="316" y2="456" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="316" y="420" width="200" height="72" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="416" y="444" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">LLMStrategy</text>
  <text x="416" y="464" text-anchor="middle" fill="#94a3b8" font-size="10">generate_signals()</text>
  <text x="416" y="482" text-anchor="middle" fill="#64748b" font-size="9">quantity = amount / price</text>

  <line x1="516" y1="456" x2="546" y2="456" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="546" y="420" width="200" height="72" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="646" y="444" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">引擎自动执行</text>
  <text x="646" y="464" text-anchor="middle" fill="#94a3b8" font-size="10">风控检查 → 下单</text>
  <text x="646" y="482" text-anchor="middle" fill="#64748b" font-size="9">OrderSync → Monitor</text>
</svg>
